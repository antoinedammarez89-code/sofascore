name: Run Python Google Sheets Script

on:
  schedule:
    - cron: "0 6 * * *"  # tous les jours à 6h UTC
  workflow_dispatch:  # lancement manuel

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps

      - name: Test Sofascore API
        run: |
          python -c "import requests; url='https://www.sofascore.com/api/v1/sport/football/scheduled-events/2026-04-27'; r=requests.get(url, headers={'User-Agent':'Mozilla/5.0'}); print('STATUS:', r.status_code); print('LEN:', len(r.text)); print(r.text[:500])"
      
      - name: Run script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python main.py
